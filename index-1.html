<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Un momento per te 🌸</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 30%, #e1bee7 70%, #f3e5f5 100%);
      font-family: Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Particelle */
    .particle {
      position: fixed;
      bottom: -20px;
      border-radius: 50%;
      background: rgba(255, 182, 193, 0.35);
      pointer-events: none;
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(0) scale(1); opacity: 0; }
      15%  { opacity: 0.7; }
      85%  { opacity: 0.3; }
      100% { transform: translateY(-110vh) scale(1.3); opacity: 0; }
    }

    /* Card */
    .card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 32px;
      padding: 48px 36px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 48px rgba(219, 112, 147, 0.15), 0 2px 12px rgba(0,0,0,0.06);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.8);
      position: relative;
      z-index: 1;
    }

    .emoji-header { font-size: 36px; margin-bottom: 8px; }

    h1 {
      font-size: 1.5rem;
      font-weight: normal;
      color: #be185d;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .subtitle {
      color: #c084a0;
      font-size: 0.9rem;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    /* Bottoni principali */
    .btn {
      width: 100%;
      border: none;
      border-radius: 50px;
      padding: 16px 28px;
      font-size: 1rem;
      font-family: Georgia, serif;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      margin-bottom: 14px;
    }
    .btn:hover  { transform: scale(1.04); }
    .btn:active { transform: scale(0.97); }

    .btn-pink {
      background: linear-gradient(135deg, #f9a8d4, #ec4899);
      color: white;
      box-shadow: 0 4px 20px rgba(236, 72, 153, 0.3);
    }

    .btn-purple {
      background: linear-gradient(135deg, #c084fc, #a855f7);
      color: white;
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.25);
    }

    .btn-small {
      width: auto;
      padding: 11px 22px;
      font-size: 0.9rem;
      margin-bottom: 0;
    }

    .btn-ghost-pink {
      background: rgba(249, 168, 212, 0.25);
      color: #be185d;
      border: 1px solid rgba(249, 168, 212, 0.6);
    }

    .btn-ghost-purple {
      background: rgba(192, 132, 252, 0.2);
      color: #7e22ce;
      border: 1px solid rgba(192, 132, 252, 0.5);
    }

    .btn-back {
      background: none;
      border: none;
      color: #c084a0;
      font-size: 0.8rem;
      font-family: Georgia, serif;
      cursor: pointer;
      text-decoration: underline;
      margin-top: 18px;
      padding: 4px;
    }

    /* Pulse ring */
    .pulse-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }
    .pulse-ring {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(249, 168, 212, 0.3);
      position: absolute;
      animation: pulse-ring 2.4s ease-in-out infinite;
    }
    .pulse-core {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f9a8d4, #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 4px 16px rgba(236, 72, 153, 0.3);
      position: relative;
    }

    @keyframes pulse-ring {
      0%   { transform: scale(1);    opacity: 0.6; }
      50%  { transform: scale(1.22); opacity: 0.15; }
      100% { transform: scale(1);    opacity: 0.6; }
    }

    /* Frase */
    .phrase-card {
      background: rgba(255, 255, 255, 0.75);
      border-radius: 20px;
      padding: 24px 20px;
      margin-bottom: 24px;
      border: 1px solid rgba(249, 168, 212, 0.4);
      box-shadow: 0 2px 16px rgba(236, 72, 153, 0.08);
      animation: fadeSlideIn 0.6s ease forwards;
    }
    .phrase-text {
      color: #9d174d;
      font-size: 1.05rem;
      line-height: 1.7;
      font-style: italic;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    /* Respirazione */
    .breath-hint {
      color: #7e22ce;
      font-style: italic;
      margin-bottom: 28px;
      font-size: 0.9rem;
    }

    .breath-circle {
      width: 140px; height: 140px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      transition: border-color 0.8s, background 0.8s, box-shadow 0.8s;
    }
    .breath-label  { font-size: 1.1rem; font-weight: bold; color: #6b21a8; }
    .breath-count  { font-size: 2.4rem; color: #7e22ce; font-weight: bold; }

    @keyframes breathe-in   { from { transform: scale(1);    } to { transform: scale(1.35); } }
    @keyframes breathe-hold { 0%, 100% { transform: scale(1.35); } }
    @keyframes breathe-out  { from { transform: scale(1.35); } to { transform: scale(1);    } }

    .steps-row {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .step-pill {
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 0.78rem;
      transition: all 0.4s;
    }
    .step-pill.inactive { background: rgba(0,0,0,0.06); color: #9ca3af; }

    /* Screen toggling */
    .screen { display: none; }
    .screen.active { display: block; }

    .footer {
      color: rgba(190, 100, 140, 0.5);
      font-size: 0.72rem;
      margin-top: 32px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="emoji-header">🌸</div>
  <h1>Un momento per te</h1>
  <p class="subtitle">Questo spazio è solo tuo. Respira.</p>

  <!-- SCHERMATA IDLE -->
  <div id="screen-idle" class="screen active">
    <button class="btn btn-pink" onclick="startTalking()">💬 Hai bisogno di parlare?</button>
    <button class="btn btn-purple" onclick="startBreathing()">🌬️ Guida alla respirazione</button>
  </div>

  <!-- SCHERMATA FRASI -->
  <div id="screen-talking" class="screen">
    <div class="pulse-wrapper">
      <div class="pulse-ring"></div>
      <div class="pulse-core">💗</div>
    </div>
    <div id="phrase-card" class="phrase-card">
      <p id="phrase-text" class="phrase-text"></p>
    </div>
    <div class="btn-row">
      <button class="btn btn-small btn-ghost-pink" onclick="nextPhrase()">✨ Altra frase</button>
      <button class="btn btn-small btn-ghost-purple" onclick="startBreathing()">🌬️ Respira</button>
    </div>
    <br>
    <button class="btn-back" onclick="goHome()">← torna all'inizio</button>
  </div>

  <!-- SCHERMATA RESPIRAZIONE -->
  <div id="screen-breathing" class="screen">
    <p class="breath-hint">Segui il cerchio con il respiro</p>
    <div id="breath-circle" class="breath-circle">
      <span class="breath-label" id="breath-label">Inspira</span>
      <span class="breath-count" id="breath-count">4</span>
    </div>
    <div class="steps-row" id="steps-row"></div>
    <button class="btn-back" onclick="goHome()">← torna all'inizio</button>
  </div>

  <p class="footer">Questo spazio non sostituisce un aiuto professionale 💗</p>
</div>

<script>
  // ─── Particelle ───────────────────────────────────────────────
  (function spawnParticles() {
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 6 + Math.random() * 10;
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${size}px;
        height: ${size}px;
        animation-duration: ${6 + Math.random() * 6}s;
        animation-delay: ${Math.random() * 8}s;
      `;
      document.body.appendChild(p);
    }
  })();

  // ─── Frasi ────────────────────────────────────────────────────
  const phrases = [
    "Respira piano. Sei esattamente dove devi essere. 🌸",
    "Ogni momento difficile passa. Anche questo. 💗",
    "Sei più forte di quanto pensi. Sempre. 🌷",
    "Va bene non stare bene. Prenditi cura di te con dolcezza. 🤍",
    "Un respiro profondo alla volta. Ce la fai. ✨",
    "Sei amato/a, anche quando non lo senti. 💖",
    "Questo momento difficile è temporaneo. La pace tornerà. 🌿",
    "Non devi risolvere tutto adesso. Fai solo il prossimo piccolo passo. 🌼",
    "Il tuo cuore è coraggioso anche quando ha paura. 🦋",
    "Sei degno/a di tutto l'amore che dai agli altri. 💕",
    "Lascia andare ciò che non puoi controllare. Abbraccia ciò che sei. 🌙",
    "Ogni giorno è una nuova possibilità. Anche oggi. 🌅",
    "Non sei solo/a. Ci sono persone che tengono a te. 🌸",
    "La tua sensibilità è una forza, non una debolezza. 💗",
    "Stai facendo del tuo meglio. Ed è abbastanza. 🌺",
  ];

  let phraseIndex = 0;
  let phraseInterval = null;

  function showPhrase(text) {
    const card = document.getElementById('phrase-card');
    const el   = document.getElementById('phrase-text');
    card.style.animation = 'none';
    card.offsetHeight; // reflow
    card.style.animation = 'fadeSlideIn 0.6s ease forwards';
    el.textContent = text;
  }

  function nextPhrase() {
    phraseIndex = (phraseIndex + 1) % phrases.length;
    showPhrase(phrases[phraseIndex]);
  }

  function startTalking() {
    phraseIndex = Math.floor(Math.random() * phrases.length);
    showPhrase(phrases[phraseIndex]);
    showScreen('screen-talking');
    if (phraseInterval) clearInterval(phraseInterval);
    phraseInterval = setInterval(nextPhrase, 5000);
  }

  // ─── Respirazione ─────────────────────────────────────────────
  const breathSteps = [
    { label: 'Inspira', duration: 4, color: '#f9a8d4', anim: 'breathe-in 4s ease-in-out forwards' },
    { label: 'Tieni',   duration: 4, color: '#c084fc', anim: 'breathe-hold 4s ease-in-out forwards' },
    { label: 'Espira',  duration: 6, color: '#a5f3fc', anim: 'breathe-out 6s ease-in-out forwards' },
  ];

  let breathStep = 0;
  let breathTimer = 0;
  let breathInterval = null;

  function renderSteps() {
    const row = document.getElementById('steps-row');
    row.innerHTML = breathSteps.map((s, i) => `
      <div class="step-pill ${i === breathStep ? '' : 'inactive'}"
           style="${i === breathStep ? `background:${s.color};color:#fff;font-weight:bold;` : ''}">
        ${s.label} ${s.duration}s
      </div>
    `).join('');
  }

  function applyBreathStep() {
    const s = breathSteps[breathStep];
    const circle = document.getElementById('breath-circle');
    document.getElementById('breath-label').textContent = s.label;
    document.getElementById('breath-count').textContent = s.duration;

    circle.style.background = `radial-gradient(circle, ${s.color}55, ${s.color}22)`;
    circle.style.border      = `3px solid ${s.color}`;
    circle.style.boxShadow   = `0 0 32px ${s.color}66`;
    circle.style.animation   = 'none';
    circle.offsetHeight;
    circle.style.animation   = s.anim;

    renderSteps();

    breathTimer = s.duration;
    if (breathInterval) clearInterval(breathInterval);
    breathInterval = setInterval(() => {
      breathTimer--;
      document.getElementById('breath-count').textContent = breathTimer;
      if (breathTimer <= 0) {
        clearInterval(breathInterval);
        breathStep = (breathStep + 1) % breathSteps.length;
        applyBreathStep();
      }
    }, 1000);
  }

  function startBreathing() {
    if (phraseInterval) clearInterval(phraseInterval);
    breathStep = 0;
    showScreen('screen-breathing');
    applyBreathStep();
  }

  // ─── Navigazione ──────────────────────────────────────────────
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function goHome() {
    if (phraseInterval) clearInterval(phraseInterval);
    if (breathInterval) clearInterval(breathInterval);
    showScreen('screen-idle');
  }
</script>
</body>
</html>
